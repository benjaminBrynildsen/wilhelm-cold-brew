<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <meta name="robots" content="noindex, nofollow"/>
  <title>Wilhelm · Admin</title>
  <link rel="icon" href="/favicon.ico" sizes="any"/>
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png"/>
  <link rel="apple-touch-icon" href="/apple-touch-icon.png"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:wght@600;700;800&family=Cinzel:wght@700;800&family=DM+Mono:wght@400;500&display=swap"/>
  <style>
    :root{
      --gold:#e8c24a; --gold-deep:#b8922f; --ink:#2b2b2b; --ink-2:#15100b;
      --panel:#1a140d; --line:rgba(232,194,74,0.22); --line-soft:rgba(232,194,74,0.10);
      --parch:#f1e6c8; --muted:rgba(241,230,200,0.78); --dim:rgba(241,230,200,0.55);
      --good:#86e09a; --bad:#f0805a;
      --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
      --display:'Bodoni Moda',Georgia,serif; --mono:'DM Mono',monospace;
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--ink);color:var(--parch);font-family:var(--sans);font-size:16px;line-height:1.55}
    a{color:var(--gold)}
    .wrap{max-width:1100px;margin:0 auto;padding:24px clamp(16px,4vw,40px)}
    h1{font-family:'Bodoni Moda',Georgia,serif;color:var(--gold);font-size:30px;margin:0 0 2px;letter-spacing:1px}
    .sub{color:var(--muted);font-size:13px;letter-spacing:2px;text-transform:uppercase}
    .pagebar{display:none}   /* phone-only page title (see the media block) */
    /* centered brand masthead */
    .masthead{display:flex;flex-direction:column;align-items:center;gap:10px;margin-top:4px;text-align:center}
    .masthead .mark{width:96px;height:96px;border-radius:50%;display:block}
    /* today's-signups badge, pinned top right — solid gold, like a button */
    .wrap{position:relative}
    .signups-badge{position:absolute;top:14px;right:clamp(16px,4vw,40px);z-index:5;min-width:74px;text-align:center;
      border-radius:9px;background:var(--gold);padding:8px 14px 7px;box-shadow:0 4px 16px rgba(0,0,0,.45)}
    .signups-badge .sb-k{display:block;font-family:var(--mono);font-size:8.5px;letter-spacing:1.6px;color:rgba(12,10,8,.7);text-transform:uppercase}
    .signups-badge .sb-v{display:block;font-family:var(--display);font-weight:700;font-size:24px;line-height:1.15;color:var(--ink)}
    /* Face ID / Log out at the right end of the desktop tab bar */
    .tab-actions{margin-left:auto;display:flex;gap:8px;align-items:center;padding-bottom:6px}
    .btn.sm{height:32px;padding:0 12px;font-size:12.5px}
    @media(max-width:760px){.tab-actions{display:none}}
    /* login */
    .login{max-width:340px;margin:14vh auto;text-align:center}
    .login input{width:100%;height:46px;padding:0 14px;background:rgba(232,217,181,.06);border:1px solid var(--line);color:var(--parch);font-family:inherit;text-align:center;margin:14px 0}
    .login button,.btn{background:var(--gold);color:var(--ink);border:none;height:40px;padding:0 18px;font-weight:700;cursor:pointer;font-family:inherit;font-size:14px;border-radius:8px;transition:filter .15s}
    .btn:hover:not(:disabled){filter:brightness(1.08)}
    .btn:disabled{opacity:.45;cursor:default}
    .login button{height:46px}
    .btn.ghost{background:transparent;color:var(--muted);border:1px solid var(--line)}
    .btn.ghost:hover{border-color:var(--gold);color:var(--gold);filter:none}
    .err{color:var(--bad);font-size:12px;min-height:16px}
    /* nav */
    /* Phone: tabs move to a fixed bottom bar (three everyday tabs + More sheet). */
    .bottomnav{display:none}
    .more-sheet{position:fixed;inset:0;z-index:60;background:rgba(0,0,0,.55)}
    .more-sheet[hidden]{display:none}
    .more-sheet .ms-panel{position:absolute;left:0;right:0;bottom:0;background:var(--panel);border-top:1px solid var(--line);border-radius:16px 16px 0 0;padding:12px 14px calc(18px + env(safe-area-inset-bottom))}
    .ms-item{display:flex;align-items:center;gap:12px;width:100%;text-align:left;background:none;border:none;border-bottom:1px solid var(--line-soft);color:var(--parch);font-family:inherit;font-size:16px;padding:14px 8px;cursor:pointer}
    .ms-item .ico{color:var(--gold-deep);flex:none}
    .ms-item.active{color:var(--gold)}
    .ms-item.active .ico{color:var(--gold)}
    .ms-actions{display:flex;gap:10px;margin-top:12px;padding-top:14px;border-top:1px solid var(--line-soft)}
    .ms-actions .btn{flex:1}
    .tabs{display:flex;gap:2px;flex-wrap:wrap;border-bottom:1px solid var(--line);margin:18px 0 22px}
    .tab{padding:10px 16px;cursor:pointer;color:var(--dim);border-bottom:2px solid transparent;letter-spacing:1.5px;text-transform:uppercase;font-size:13px;transition:color .15s}
    .tab:hover{color:var(--parch)}
    .tab.active{color:var(--gold);border-bottom-color:var(--gold)}
    @media(max-width:760px){
      .tabs{display:none}
      .masthead{display:none}   /* the bottom-bar logo carries the brand on phones */
      /* app-style top bar: centered page title, badge on its right; the bar
         reserves the height so the badge can't cover the pickers below */
      .pagebar{display:flex;align-items:center;justify-content:center;min-height:76px;margin-bottom:6px}
      #pagetitle{font-family:'Cinzel',var(--display);font-weight:800;color:var(--gold);font-size:21px;letter-spacing:3px;text-transform:uppercase}
      .signups-badge{top:10px;right:16px}
      .wrap{padding-bottom:96px}
      .bottomnav{position:fixed;left:0;right:0;bottom:0;z-index:50;display:flex;background:rgba(43,43,43,.94);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-top:1px solid var(--line);padding:4px 6px calc(4px + env(safe-area-inset-bottom))}
      .bn-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;background:none;border:none;border-top:2px solid transparent;color:var(--dim);font-family:var(--mono);font-size:9.5px;letter-spacing:1.2px;text-transform:uppercase;cursor:pointer;padding:9px 2px 7px;overflow:hidden}
      .bn-item span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
      .bn-item.active{color:var(--gold);border-top-color:var(--gold)}
      /* the logo floats like a badge: bigger than the bar, top ~20% above it */
      .bn-logo{flex:0 0 86px;justify-content:flex-start;padding:0 2px;overflow:visible;margin-top:-20px;border-top:none}
      .bn-logo img{width:70px;height:70px;border-radius:50%;display:block;background:var(--ink);
        border:1.5px solid var(--gold-deep);box-shadow:0 4px 14px rgba(0,0,0,.6)}
      .bn-logo.active img{border-color:var(--gold);box-shadow:0 4px 14px rgba(0,0,0,.6),0 0 12px rgba(232,194,74,.55)}
    }
    /* Window pickers — the .win runs read as one segmented control: inner borders
       collapse, only the run's outer corners round. A .win with a non-.win before
       it (a label/input) starts a new run; a lone .win becomes its own pill. */
    .winbar{display:flex;gap:10px;margin-bottom:10px;flex-wrap:wrap;align-items:center}
    .win{padding:8px 15px;border:1px solid var(--line);border-left-width:0;cursor:pointer;color:var(--muted);font-size:13.5px;background:transparent;font-family:inherit;line-height:1.3;transition:color .15s,background .15s}
    .win+.win{margin-left:-10px}   /* cancel the flex gap inside a run so segments touch */
    .winbar>.win:first-child,.winbar>:not(.win)+.win{border-left-width:1px;border-top-left-radius:8px;border-bottom-left-radius:8px}
    .win:not(:has(+.win)){border-top-right-radius:8px;border-bottom-right-radius:8px}
    .win.active{background:var(--gold);color:var(--ink);border-color:var(--gold);font-weight:700}
    .win:hover:not(.active){background:rgba(232,194,74,.07);color:var(--parch)}
    /* date controls: make the picker obviously interactive */
    .winlabel{font-family:var(--mono);font-size:10.5px;letter-spacing:2px;color:var(--dim);min-width:48px;text-transform:uppercase}
    .dateinput{background:rgba(232,217,181,.05);border:1px solid var(--line);border-radius:8px;color:var(--parch);font-family:inherit;font-size:13.5px;padding:7px 10px;cursor:pointer;color-scheme:dark}
    .dateinput.active{border-color:var(--gold);background:rgba(232,194,74,.10)}
    .dateinput:hover,.dateinput:focus{border-color:var(--gold);outline:none}
    .daystep{display:inline-flex;align-items:center;justify-content:center;min-width:36px;height:36px;padding:0;font-size:18px;line-height:1;border:1px solid var(--line);border-radius:8px;background:rgba(232,217,181,.05);color:var(--gold);cursor:pointer;font-weight:700}
    .daystep:hover{background:var(--gold);color:var(--ink);border-color:var(--gold)}
    /* cards */
    .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin:18px 0 12px}
    .card{background:var(--panel);border:1px solid var(--line);padding:14px 16px 13px;display:flex;flex-direction:column;aspect-ratio:1}
    .card .k{color:var(--dim);font-family:var(--mono);font-size:10.5px;letter-spacing:1.6px;text-transform:uppercase;line-height:1.55}
    .card .v{font-family:var(--display);font-size:36px;line-height:.95;color:var(--parch);margin-top:auto;padding-top:12px;white-space:nowrap}
    .card .v small{font-size:.38em;color:var(--gold)}
    /* funnel */
    .step{margin:12px 0}
    .step .lbl{display:flex;justify-content:space-between;font-size:15px;margin-bottom:5px}
    .step .lbl .pct{color:var(--gold)}
    .bar{height:28px;background:rgba(232,217,181,.06);position:relative;overflow:hidden;border-radius:5px}
    .bar .fill{height:100%;background:linear-gradient(90deg,var(--gold-deep),var(--gold));border-radius:0 4px 4px 0}
    .drop{color:var(--bad);font-size:13px}
    /* tables — quiet rules, hover rows, aligned numerals */
    table{width:100%;border-collapse:collapse;margin:6px 0 24px}
    th,td{text-align:left;padding:9px 12px;border-bottom:1px solid var(--line-soft);font-size:14.5px}
    th{color:var(--dim);font-family:var(--mono);font-size:10.5px;letter-spacing:1.6px;text-transform:uppercase;border-bottom-color:rgba(232,194,74,.28);cursor:pointer;user-select:none;white-space:nowrap}
    tbody tr{transition:background .12s}
    tbody tr:hover{background:rgba(232,194,74,.045)}
    td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
    /* Phones: a wide table scrolls sideways inside its own box instead of spilling
       past panel borders and forcing the whole page to zoom out / pan. */
    @media(max-width:760px){table{display:block;overflow-x:auto;-webkit-overflow-scrolling:touch}}
    h3{font-family:var(--display);color:var(--gold);margin:30px 0 8px;font-weight:600;font-size:20px}
    h3 .note{font-family:var(--sans);font-weight:400;font-size:12.5px;letter-spacing:.2px}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:24px}
    @media(max-width:760px){.grid2{grid-template-columns:1fr}}
    .spark{display:flex;align-items:flex-end;gap:3px;height:80px;margin:10px 0}
    .spark .b{flex:1;background:var(--gold-deep);min-height:2px;border-radius:3px 3px 0 0}
    .spark .b:hover{background:var(--gold)}
    textarea,input.fld{width:100%;background:rgba(232,217,181,.06);border:1px solid var(--line);color:var(--parch);font-family:inherit;padding:10px;margin:6px 0}
    .note{color:var(--dim);font-size:12.5px;line-height:1.55}
    /* loading: the brand logo spins in place; one gold pulse when data lands */
    .navspin{animation:navSpin 1s linear infinite}
    @keyframes navSpin{to{transform:rotate(360deg)}}
    .navflash{animation:navFlash .8s ease}
    @keyframes navFlash{0%{box-shadow:0 0 0 0 rgba(232,194,74,.75)}100%{box-shadow:0 0 0 16px rgba(232,194,74,0)}}
    @media(prefers-reduced-motion:reduce){.navspin,.navflash{animation:none}}
    /* shared bordered panel (Autopilot etc.) */
    .panel{border:1px solid rgba(184,146,47,.5);background:linear-gradient(180deg,rgba(232,194,74,.04),rgba(232,194,74,0) 140px),var(--panel);border-radius:14px;padding:16px 20px;margin:0 0 28px;overflow-x:auto}
    .panel>h3:first-child{margin-top:2px}
    /* long explainers fold away behind a quiet toggle */
    details.how{margin:6px 0 4px}
    details.how summary{cursor:pointer;color:var(--dim);font-size:12.5px;letter-spacing:.4px;user-select:none;width:max-content;list-style:none}
    details.how summary::-webkit-details-marker{display:none}
    details.how summary::before{content:'▸ ';color:var(--gold-deep)}
    details.how[open] summary::before{content:'▾ '}
    details.how summary:hover{color:var(--gold)}
    details.how[open] summary{margin-bottom:4px}
    /* every small numeric/date field, wherever it's used */
    input[type="number"],input[type="date"]{border-radius:7px;font-family:inherit;color-scheme:dark}
    input[type="number"]{font-variant-numeric:tabular-nums}
    /* Ad Fit tab: creative → arrow → live landing preview, plus the staged checklist */
    .fitboard{display:grid;grid-template-columns:minmax(260px,340px) 130px minmax(280px,1fr);gap:18px;align-items:start;margin:8px 0 26px}
    @media(max-width:900px){.fitboard{grid-template-columns:1fr}.fit-arrow .fa-line{transform:rotate(90deg)}}
    .adcard{background:#000;border:1px solid #2f3336;border-radius:16px;padding:14px;color:#e7e9ea;font-family:-apple-system,'Segoe UI',Roboto,sans-serif}
    .adcard-head{display:flex;gap:10px;align-items:center;font-size:14px;line-height:1.25;margin-bottom:10px}
    .adcard-avatar img{width:40px;height:40px;border-radius:50%;display:block}
    .adcard-text{font-size:14.5px;line-height:1.45;white-space:pre-wrap;margin-bottom:10px}
    .adcard-img{width:100%;border-radius:12px;display:block}
    .adcard-noimg{border:1px dashed #2f3336;border-radius:12px;padding:36px 12px;text-align:center}
    .adcard-cta{margin-top:10px;font-size:12px;color:#71767b;border:1px solid #2f3336;border-radius:8px;padding:8px 10px}
    .adcard-empty{display:flex;align-items:center;justify-content:center;min-height:220px}
    .fit-arrow{text-align:center;align-self:center}
    .fit-arrow .fa-line{font-size:44px;color:var(--gold);line-height:1}
    .fit-arrow .fa-stats{font-size:13px;margin-top:8px;line-height:1.6}
    .fit-arrow code{font-size:10px;color:var(--gold);word-break:break-all}
    .gd{color:var(--good)} .bd{color:var(--bad)}
    .phone-wrap{justify-self:center;max-width:400px;width:100%}
    .phone{border:10px solid #241c11;border-radius:34px;overflow:hidden;background:#000;box-shadow:0 6px 30px rgba(0,0,0,.5)}
    .phone iframe{width:390px;height:720px;border:0;display:block;transform-origin:0 0}
    @media(max-width:440px){.phone iframe{width:100%;}}
    .prevctl{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
    .prevctl select{background:rgba(232,217,181,.06);border:1px solid var(--line);color:var(--parch);font-family:inherit;font-size:12px;padding:6px 8px;flex:1;min-width:45%}
    .adpill small{color:inherit;opacity:.75;font-weight:400}
    .stage{margin:14px 0 20px}
    .stage-h{font-family:'DM Mono',monospace;letter-spacing:2px;font-size:12px;text-transform:uppercase;color:var(--gold);border-bottom:1px solid var(--line);padding-bottom:6px;margin-bottom:10px}
    .stage-h small{display:block;color:var(--muted);letter-spacing:0;text-transform:none;font-family:inherit;font-size:12px;margin-top:3px}
    .pt{display:flex;gap:10px;align-items:baseline;padding:7px 0;border-bottom:1px dashed rgba(232,194,74,.10);flex-wrap:wrap}
    .pt-dot{width:9px;height:9px;border-radius:50%;flex:none;align-self:center}
    .pt.good .pt-dot{background:var(--good)} .pt.warn .pt-dot{background:var(--gold)} .pt.bad .pt-dot{background:var(--bad)} .pt.nodata .pt-dot{background:rgba(241,230,200,.3)}
    .pt-label{flex:1;min-width:220px;font-size:14.5px}
    .pt-chips{display:flex;gap:6px;flex-wrap:wrap}
    .chip{font-size:11.5px;padding:3px 9px;border-radius:20px;border:1px solid var(--line);white-space:nowrap}
    .chip.good{color:var(--good);border-color:rgba(134,224,154,.4)}
    .chip.warn{color:var(--gold);border-color:rgba(232,194,74,.5)}
    .chip.bad{color:var(--bad);border-color:rgba(240,128,90,.45)}
    .chip.na{color:var(--muted)}
    .chip.lift{color:#9ecbff;border-color:rgba(158,203,255,.4)}
    .fixlist{margin:8px 0 22px;padding-left:20px;line-height:1.7;font-size:14.5px}
    .fixlist li{margin-bottom:8px}
    .adedit{border:1px solid var(--line);padding:12px 16px;margin:18px 0;background:var(--panel)}
    .adedit summary{cursor:pointer;color:var(--gold);letter-spacing:1px;font-size:13px;text-transform:uppercase}
    .ed-pt{display:block;font-size:13.5px;padding:3px 0;cursor:pointer}
    .rowlink{cursor:pointer} .rowlink:hover td{color:var(--gold)}
    .pill{display:inline-block;padding:2px 8px;border:1px solid var(--line);font-size:12px;color:var(--gold)}
    .row-actions{display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
  </style>
</head>
<body>
  <div id="app" class="wrap"></div>
  <script src="webauthn-browser.js"></script>
  <script src="admin.js"></script>
</body>
</html>
