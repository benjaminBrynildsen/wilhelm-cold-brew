services:
  - type: web
    name: wilhelm-cold-brew
    runtime: node
    plan: starter
    region: oregon
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_API_KEY
        sync: false
      - key: IP_SALT
        sync: false
      - key: SESSION_SECRET
        sync: false
      # Optional: enables the one-click "Pull from Mailchimp" unsubscribe sync
      # in the admin Email tab. Create the key in Mailchimp → Account & billing
      # → Extras → API keys. The paste-an-export fallback works without it.
      - key: MAILCHIMP_API_KEY
        sync: false
