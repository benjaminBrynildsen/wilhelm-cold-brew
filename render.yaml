services:
  - type: web
    name: wilhelm-cold-brew
    runtime: static
    buildCommand: ""
    staticPublishPath: .
    autoDeploy: true
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
