# One-off read-only analytics queries against the production database,
# dispatched by an analysis session whose own network can't reach Postgres.
# Queries run inside a READ ONLY transaction; results print to the job log.
name: analytics-query
on:
  workflow_dispatch:
    inputs:
      queries_b64:
        description: base64 of a JSON array of SELECT statements
        required: true
      db_url:
        description: postgres connection string (used read-only)
        required: true
jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: mask credential
        run: echo "::add-mask::${{ inputs.db_url }}"
      - name: install pg
        run: npm install pg@8 --no-save --silent
      - name: run queries read-only
        env:
          DB_URL: ${{ inputs.db_url }}
          QUERIES_B64: ${{ inputs.queries_b64 }}
        run: |
          node - <<'EOF'
          const pg = require('pg');
          (async () => {
            const queries = JSON.parse(Buffer.from(process.env.QUERIES_B64, 'base64').toString('utf8'));
            const c = new pg.Client({ connectionString: process.env.DB_URL, ssl: { rejectUnauthorized: false } });
            await c.connect();
            await c.query('BEGIN TRANSACTION READ ONLY');
            await c.query(`SET LOCAL statement_timeout = '30s'`);
            for (let i = 0; i < queries.length; i++) {
              let out;
              try { out = (await c.query(queries[i])).rows; }
              catch (e) {
                out = { error: e.message };
                await c.query('ROLLBACK'); await c.query('BEGIN TRANSACTION READ ONLY');
              }
              console.log(`==RESULT ${i}==`);
              console.log(JSON.stringify(out));
            }
            await c.query('ROLLBACK');
            await c.end();
          })().catch((e) => { console.error('FATAL', e.message); process.exit(1); });
          EOF
