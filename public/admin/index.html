<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <meta name="robots" content="noindex, nofollow"/>
  <title>Wilhelm · Admin</title>
  <link rel="icon" href="/favicon.ico" sizes="any"/>
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png"/>
  <link rel="apple-touch-icon" href="/apple-touch-icon.png"/>
  <style>
    :root{
      --gold:#e8c24a; --gold-deep:#b8922f; --ink:#0c0a08; --ink-2:#15100b;
      --panel:#1a140d; --line:rgba(232,194,74,0.22); --parch:#f1e6c8; --muted:rgba(241,230,200,0.78);
      --good:#86e09a; --bad:#f0805a;
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--ink);color:var(--parch);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;font-size:16px;line-height:1.55}
    a{color:var(--gold)}
    .wrap{max-width:1100px;margin:0 auto;padding:24px clamp(16px,4vw,40px)}
    h1{font-family:'Bodoni Moda',Georgia,serif;color:var(--gold);font-size:30px;margin:0 0 2px;letter-spacing:1px}
    .sub{color:var(--muted);font-size:13px;letter-spacing:2px;text-transform:uppercase}
    /* login */
    .login{max-width:340px;margin:14vh auto;text-align:center}
    .login input{width:100%;height:46px;padding:0 14px;background:rgba(232,217,181,.06);border:1px solid var(--line);color:var(--parch);font-family:inherit;text-align:center;margin:14px 0}
    .login button,.btn{background:var(--gold);color:var(--ink);border:none;height:46px;padding:0 22px;font-weight:700;cursor:pointer;font-family:inherit}
    .btn.ghost{background:transparent;color:var(--parch);border:1px solid var(--line)}
    .err{color:var(--bad);font-size:12px;min-height:16px}
    /* nav */
    .tabs{display:flex;gap:6px;flex-wrap:wrap;border-bottom:1px solid var(--line);margin:18px 0 24px}
    .tab{padding:11px 18px;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;letter-spacing:1px;text-transform:uppercase;font-size:14px}
    .tab.active{color:var(--gold);border-bottom-color:var(--gold)}
    .winbar{display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap;align-items:center}
    .win{padding:7px 14px;border:1px solid var(--line);cursor:pointer;color:var(--muted);font-size:14px}
    .win.active{background:var(--gold);color:var(--ink);border-color:var(--gold);font-weight:700}
    .win:hover{border-color:var(--gold);color:var(--parch)}
    /* date controls: make the picker obviously interactive */
    .winlabel{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:2px;color:var(--muted);min-width:48px}
    .dateinput{background:rgba(232,194,74,.10);border:1px solid var(--gold-deep);border-radius:6px;color:var(--parch);font-family:inherit;font-size:14px;padding:7px 10px;cursor:pointer;color-scheme:dark}
    .dateinput:hover,.dateinput:focus{border-color:var(--gold);outline:none}
    .daystep{display:inline-flex;align-items:center;justify-content:center;min-width:38px;height:36px;padding:0;font-size:20px;line-height:1;border:1px solid var(--gold-deep);border-radius:6px;background:rgba(232,194,74,.10);color:var(--gold);cursor:pointer;font-weight:700}
    .daystep:hover{background:var(--gold);color:var(--ink);border-color:var(--gold)}
    /* cards */
    .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:22px}
    .card{background:var(--panel);border:1px solid var(--line);padding:16px}
    .card .k{color:var(--muted);font-size:13px;letter-spacing:1px;text-transform:uppercase}
    .card .v{font-family:'Bodoni Moda',Georgia,serif;font-size:34px;color:var(--parch);margin-top:6px}
    .card .v small{font-size:16px;color:var(--gold)}
    /* funnel */
    .step{margin:12px 0}
    .step .lbl{display:flex;justify-content:space-between;font-size:15px;margin-bottom:5px}
    .step .lbl .pct{color:var(--gold)}
    .bar{height:30px;background:rgba(232,217,181,.06);position:relative;overflow:hidden}
    .bar .fill{height:100%;background:linear-gradient(90deg,var(--gold-deep),var(--gold))}
    .drop{color:var(--bad);font-size:13px}
    /* tables */
    table{width:100%;border-collapse:collapse;margin:8px 0 20px}
    th,td{text-align:left;padding:10px 12px;border-bottom:1px solid rgba(232,194,74,.14);font-size:15px}
    th{color:var(--muted);font-size:12px;letter-spacing:1px;text-transform:uppercase}
    td.num,th.num{text-align:right}
    /* Phones: a wide table scrolls sideways inside its own box instead of spilling
       past panel borders and forcing the whole page to zoom out / pan. */
    @media(max-width:760px){table{display:block;overflow-x:auto;-webkit-overflow-scrolling:touch}}
    h3{font-family:'Bodoni Moda',Georgia,serif;color:var(--gold);margin:24px 0 6px;font-weight:600;font-size:21px}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:24px}
    @media(max-width:760px){.grid2{grid-template-columns:1fr}}
    .spark{display:flex;align-items:flex-end;gap:3px;height:80px;margin:10px 0}
    .spark .b{flex:1;background:var(--gold-deep);min-height:2px}
    textarea,input.fld{width:100%;background:rgba(232,217,181,.06);border:1px solid var(--line);color:var(--parch);font-family:inherit;padding:10px;margin:6px 0}
    .note{color:var(--muted);font-size:13px}
    /* Ad Fit tab: creative → arrow → live landing preview, plus the staged checklist */
    .fitboard{display:grid;grid-template-columns:minmax(260px,340px) 130px minmax(280px,1fr);gap:18px;align-items:start;margin:8px 0 26px}
    @media(max-width:900px){.fitboard{grid-template-columns:1fr}.fit-arrow .fa-line{transform:rotate(90deg)}}
    .adcard{background:#000;border:1px solid #2f3336;border-radius:16px;padding:14px;color:#e7e9ea;font-family:-apple-system,'Segoe UI',Roboto,sans-serif}
    .adcard-head{display:flex;gap:10px;align-items:center;font-size:14px;line-height:1.25;margin-bottom:10px}
    .adcard-avatar img{width:40px;height:40px;border-radius:50%;display:block}
    .adcard-text{font-size:14.5px;line-height:1.45;white-space:pre-wrap;margin-bottom:10px}
    .adcard-img{width:100%;border-radius:12px;display:block}
    .adcard-noimg{border:1px dashed #2f3336;border-radius:12px;padding:36px 12px;text-align:center}
    .adcard-cta{margin-top:10px;font-size:12px;color:#71767b;border:1px solid #2f3336;border-radius:8px;padding:8px 10px}
    .adcard-empty{display:flex;align-items:center;justify-content:center;min-height:220px}
    .fit-arrow{text-align:center;align-self:center}
    .fit-arrow .fa-line{font-size:44px;color:var(--gold);line-height:1}
    .fit-arrow .fa-stats{font-size:13px;margin-top:8px;line-height:1.6}
    .fit-arrow code{font-size:10px;color:var(--gold);word-break:break-all}
    .gd{color:var(--good)} .bd{color:var(--bad)}
    .phone-wrap{justify-self:center;max-width:400px;width:100%}
    .phone{border:10px solid #241c11;border-radius:34px;overflow:hidden;background:#000;box-shadow:0 6px 30px rgba(0,0,0,.5)}
    .phone iframe{width:390px;height:720px;border:0;display:block;transform-origin:0 0}
    @media(max-width:440px){.phone iframe{width:100%;}}
    .prevctl{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
    .prevctl select{background:rgba(232,217,181,.06);border:1px solid var(--line);color:var(--parch);font-family:inherit;font-size:12px;padding:6px 8px;flex:1;min-width:45%}
    .adpill small{color:inherit;opacity:.75;font-weight:400}
    .stage{margin:14px 0 20px}
    .stage-h{font-family:'DM Mono',monospace;letter-spacing:2px;font-size:12px;text-transform:uppercase;color:var(--gold);border-bottom:1px solid var(--line);padding-bottom:6px;margin-bottom:10px}
    .stage-h small{display:block;color:var(--muted);letter-spacing:0;text-transform:none;font-family:inherit;font-size:12px;margin-top:3px}
    .pt{display:flex;gap:10px;align-items:baseline;padding:7px 0;border-bottom:1px dashed rgba(232,194,74,.10);flex-wrap:wrap}
    .pt-dot{width:9px;height:9px;border-radius:50%;flex:none;align-self:center}
    .pt.good .pt-dot{background:var(--good)} .pt.warn .pt-dot{background:var(--gold)} .pt.bad .pt-dot{background:var(--bad)} .pt.nodata .pt-dot{background:rgba(241,230,200,.3)}
    .pt-label{flex:1;min-width:220px;font-size:14.5px}
    .pt-chips{display:flex;gap:6px;flex-wrap:wrap}
    .chip{font-size:11.5px;padding:3px 9px;border-radius:20px;border:1px solid var(--line);white-space:nowrap}
    .chip.good{color:var(--good);border-color:rgba(134,224,154,.4)}
    .chip.warn{color:var(--gold);border-color:rgba(232,194,74,.5)}
    .chip.bad{color:var(--bad);border-color:rgba(240,128,90,.45)}
    .chip.na{color:var(--muted)}
    .chip.lift{color:#9ecbff;border-color:rgba(158,203,255,.4)}
    .fixlist{margin:8px 0 22px;padding-left:20px;line-height:1.7;font-size:14.5px}
    .fixlist li{margin-bottom:8px}
    .adedit{border:1px solid var(--line);padding:12px 16px;margin:18px 0;background:var(--panel)}
    .adedit summary{cursor:pointer;color:var(--gold);letter-spacing:1px;font-size:13px;text-transform:uppercase}
    .ed-pt{display:block;font-size:13.5px;padding:3px 0;cursor:pointer}
    .rowlink{cursor:pointer} .rowlink:hover td{color:var(--gold)}
    .pill{display:inline-block;padding:2px 8px;border:1px solid var(--line);font-size:12px;color:var(--gold)}
    .row-actions{display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
  </style>
</head>
<body>
  <div id="app" class="wrap"></div>
  <script src="webauthn-browser.js"></script>
  <script src="admin.js"></script>
</body>
</html>
